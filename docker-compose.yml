# Full stack (backend + frontends): docker-compose up -d --build
# Requires sibling repos (same parent directory):
#   ../mentorship-frontend-master
#   ../mentorship-frontend-admin
# API only: make compose-api-up

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
  HTTP_PORT: "8080"
  HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
  HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
  HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
  HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
  DATABASE_URL: postgres://${POSTGRES_USER:-mentorship}:${POSTGRES_PASSWORD:-mentorship}@postgres:5432/${POSTGRES_DB:-mentorship}?sslmode=disable
  DATABASE_MAX_CONNS: ${DATABASE_MAX_CONNS:-25}
  DATABASE_MIN_CONNS: ${DATABASE_MIN_CONNS:-2}
  DATABASE_MAX_CONN_LIFETIME: ${DATABASE_MAX_CONN_LIFETIME:-30m}
  DATABASE_MAX_CONN_IDLE_TIME: ${DATABASE_MAX_CONN_IDLE_TIME:-5m}
  DATABASE_HEALTH_TIMEOUT: ${DATABASE_HEALTH_TIMEOUT:-2s}
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_HEALTH_TIMEOUT: ${REDIS_HEALTH_TIMEOUT:-2s}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mentorship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentorship}
      POSTGRES_DB: ${POSTGRES_DB:-mentorship}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - mentorship
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mentorship} -d ${POSTGRES_DB:-mentorship}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - mentorship
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
      MIGRATIONS_PATH: /app/migrations
    entrypoint: ["/app/migrate", "-migrations", "/app/migrations", "-direction", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mentorship
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentorship
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ../mentorship-frontend-master
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mentorship
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend-admin:
    build:
      context: ../mentorship-frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
    ports:
      - "${ADMIN_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mentorship
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  mentorship:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
